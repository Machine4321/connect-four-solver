<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Four - Optimal Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>Connect <span>Four</span></h1>
            <p class="subtitle">Analysis Board / Position Solver</p>
        </header>

        <div class="game-area">
            <div class="controls-panel glass-panel">
                <div class="status-box">
                    <div id="turn-indicator" class="player-indicator"></div>
                    <span id="status-text">Red to play</span>
                </div>
                
                <div class="legend glass-panel" style="padding: 1rem; margin-top: 1rem; font-size: 0.9rem;">
                    <h3 style="margin-bottom: 0.5rem; font-size: 1rem;">Mitä pisteet tarkoittavat?</h3>
                    <p><strong style="color: #4ade80;">+ Luku:</strong> Kyseinen pelaaja voi pakottaa voiton.</p>
                    <p><strong style="color: #f87171;">- Luku:</strong> Kyseinen pelaaja häviää, jos vastustaja pelaa täydellisesti.</p>
                    <p><strong style="color: #94a3b8;">0:</strong> Tasapeli optimaalisella pelillä.</p>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-calculate" class="primary-btn calculate-btn">Calculate Optimal Move for Red</button>
                    <div class="secondary-actions">
                        <button id="btn-undo" class="secondary-btn">Undo Move</button>
                        <button id="btn-clear" class="secondary-btn">Clear Board</button>
                    </div>
                </div>
            </div>

            <div class="board-wrapper">
                <!-- Drop zones for column hovering -->
                <div class="drop-zones" id="drop-zones">
                    <div class="drop-zone" data-col="0"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="1"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="2"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="3"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="4"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="5"><div class="score-badge"></div></div>
                    <div class="drop-zone" data-col="6"><div class="score-badge"></div></div>
                </div>
                
                <!-- The actual board -->
                <div class="board glass-panel" id="board">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </div>
        </div>
        
        <div id="winner-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2 id="winner-text">You Win!</h2>
                <button id="btn-play-again" class="primary-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>
</html>
