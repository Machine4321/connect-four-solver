<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Four - Optimal Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>Connect <span>Four</span></h1>
            <p class="subtitle">Play against an optimal AI</p>
        </header>

        <div class="game-area">
            <div class="controls-panel glass-panel">
                <div class="status-box">
                    <div id="turn-indicator" class="player-indicator"></div>
                    <span id="status-text">Your Turn!</span>
                </div>
                
                <div class="settings">
                    <div class="setting-group">
                        <label>Difficulty:</label>
                        <select id="difficulty-select">
                            <option value="4">Easy (Depth 4)</option>
                            <option value="6">Medium (Depth 6)</option>
                            <option value="8" selected>Hard (Depth 8)</option>
                            <option value="11">Expert (Depth 11)</option>
                            <option value="14">Master (Depth 14)</option>
                            <option value="16">Grandmaster (Depth 16)</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Play as:</label>
                        <div class="color-toggle">
                            <button id="btn-play-red" class="active">Red (1st)</button>
                            <button id="btn-play-yellow">Yellow (2nd)</button>
                        </div>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">AI Eval:</span>
                        <span id="ai-eval" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Nodes:</span>
                        <span id="ai-nodes" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Time:</span>
                        <span id="ai-time" class="stat-value">0ms</span>
                    </div>
                </div>

                <button id="btn-restart" class="primary-btn">Restart Game</button>
            </div>

            <div class="board-wrapper">
                <!-- Drop zones for column hovering -->
                <div class="drop-zones" id="drop-zones">
                    <div class="drop-zone" data-col="0"></div>
                    <div class="drop-zone" data-col="1"></div>
                    <div class="drop-zone" data-col="2"></div>
                    <div class="drop-zone" data-col="3"></div>
                    <div class="drop-zone" data-col="4"></div>
                    <div class="drop-zone" data-col="5"></div>
                    <div class="drop-zone" data-col="6"></div>
                </div>
                
                <!-- The actual board -->
                <div class="board glass-panel" id="board">
                    <!-- Grid cells will be generated by JS -->
                </div>
            </div>
        </div>
        
        <div id="winner-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2 id="winner-text">You Win!</h2>
                <button id="btn-play-again" class="primary-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>
</html>
